<!DOCTYPE html>
<html>

<head>
    <title>Opening Obsidian...</title>
</head>

<body>
    <script>
        // 1. Get the part of the URL after the #
        var payload = window.location.hash;

        // 2. If it exists, strip the # and open the link
        if (payload.length > 1) {
            // substring(1) removes the '#' character
            window.location.href = payload.substring(1);

            // Optional: Close the tab automatically
            setTimeout(function () { window.close(); }, 100);
        }
    </script>
</body>

</html>
