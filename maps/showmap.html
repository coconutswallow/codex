<div class="container-fluid" style="padding: 0; height: 85vh; background: #000;">
    <iframe 
        id="map-frame" 
        src=""
        style="width: 100%; height: 100%; border: none; display: block;"
        allowfullscreen>
    </iframe>
</div>

<script>
    function updateIframe() {
        const frame = document.getElementById('map-frame');
        
        // Get map name from hash (e.g., #Ansalon from URL /maps/showmap#Ansalon)
        const mapName = window.location.hash.substring(1); 

        if (mapName) {
            // Point iframe directly to viewer.html with map parameter
            frame.src = "/codex/maps/viewer.html?map=" + encodeURIComponent(mapName);
        } else {
            // No map specified - show instruction
            frame.style.display = 'none';
            document.querySelector('.container-fluid').innerHTML = 
                '<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: white; font-family: sans-serif;">' +
                '<h3>Please select a map (e.g. /maps/showmap#Ansalon)</h3>' +
                '</div>';
        }
    }

    // Update iframe when hash changes or page loads
    window.addEventListener('hashchange', updateIframe);
    window.addEventListener('load', updateIframe);
</script>
