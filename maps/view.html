<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Map Gallery</title>
    <style>
        /* Force the body and html to take up the full height of the browser */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background: #1a1a1a; 
        }
        /* Ensure the iframe fills the entire wrapper */
        #map-frame { 
            border: none; 
            width: 100%; 
            height: 100vh; /* Viewport Height */
            display: block; 
        }
    </style>
</head>
<body>
    <iframe id="map-frame" src=""></iframe>

    <script>
        function updateFrame() {
            const frame = document.getElementById('map-frame');
            const mapName = window.location.hash.substring(1);

            if (mapName) {
                // Use a relative path to your viewer.html
                frame.src = `../viewer.html?map=${encodeURIComponent(mapName)}`;
            }
        }
        window.addEventListener('hashchange', updateFrame);
        window.addEventListener('load', updateFrame);
    </script>
</body>
</html>
