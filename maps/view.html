<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Map Gallery</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a1a; }
        iframe { border: none; width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <iframe id="map-frame" src=""></iframe>

    <script>
        function updateFrame() {
            const frame = document.getElementById('map-frame');
            // Extract map name from URL hash (e.g., #ansalon)
            const mapName = window.location.hash.substring(1);

            if (mapName) {
                // Pass the name to viewer.html via query parameter
                frame.src = `../viewer.html?map=${encodeURIComponent(mapName)}`;
            } else {
                document.body.innerHTML = "<h2 style='color:white;text-align:center;padding-top:20%;font-family:sans-serif;'>No map specified (e.g. view#ansalon)</h2>";
            }
        }
        window.addEventListener('hashchange', updateFrame);
        window.addEventListener('load', updateFrame);
    </script>
</body>
</html>
