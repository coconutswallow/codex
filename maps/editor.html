---
layout: default
title: Map Editor
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Map Editor</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="{{ '/assets/css/map.css' | relative_url }}" />

    <style>
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; font-family: sans-serif; }
        .controls { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; background: #f5f5f5; padding: 15px; border-radius: 8px; 
        }
        .control-group label { font-weight: bold; margin-right: 10px; }
        .control-group select { padding: 8px; min-width: 250px; border-radius: 4px; border: 1px solid #ccc;}
        
        #editor-widget { 
            height: 650px; 
            width: 100%; 
            background: #222; 
            border-radius: 4px; 
            border: 2px solid #ccc;
        }
        
        .info-text { font-size: 0.9em; color: #666; margin-top: 10px; text-align: center;}
        
        /* Added helper for auth state */
        .auth-warning { text-align: center; padding: 50px; color: #666; }
    </style>
</head>
<body>
    {% include auth-header.html %}

    <div class="container" id="main-container" style="display:none;">
        <h1>Map Editor</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="map-select">Select Map:</label>
                <select id="map-select">
                    <option value="">Loading maps...</option>
                </select>
            </div>
            
            <button id="save-view-btn" style="background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px;">
                💾 Set Current View as Default
            </button>
        </div>

        <div id="editor-widget"
            data-map-component
            data-editable="true">
        </div>
        
        <p class="info-text">
            <strong>Controls:</strong> Right-click to Add Pin • Click Pin to Edit/Delete • Pan/Zoom to desired spot and click "Set Default"
        </p>
    </div>

    <div id="login-prompt" class="auth-warning">
        <h2>Restricted Access</h2>
        <p>You must be logged in to use the Map Editor.</p>
    </div>

    <script type="module">
        import { fetchMapList, initMapComponents } from '/codex/assets/js/map-widget.js';
        // Import Supabase to check current user
        import { supabase } from '/codex/assets/js/supabaseClient.js';

        const mapSelect = document.getElementById('map-select');
        const saveBtn = document.getElementById('save-view-btn');
        const mainContainer = document.getElementById('main-container');
        const loginPrompt = document.getElementById('login-prompt');
        let editorWidget = null;

        async function init() {
            try {
                // 1. Check Authentication (must be logged in)
                const { data: { user } } = await supabase.auth.getUser();

                if (!user) {
                    // Not logged in: keep editor hidden, show prompt
                    console.log("User not logged in");
                    return; 
                }

                // Logged in: Show editor, hide prompt
                mainContainer.style.display = 'block';
                loginPrompt.style.display = 'none';

                // 2. Initialize the map components
                initMapComponents();

                // 3. Fetch maps list
                const maps = await fetchMapList();

                if (!maps || maps.length === 0) {
                    mapSelect.innerHTML = '<option value="">No maps available</option>';
                    return;
                }

                // 4. Populate Dropdown (All maps available to authenticated users)
                mapSelect.innerHTML = maps.map(m => 
                    `<option value="${m.id}">${m.name}</option>`
                ).join('');

                // 5. Handle URL Params (e.g. coming from "Edit" button in view.html)
                const urlParams = new URLSearchParams(window.location.search);
                const targetId = urlParams.get('id');
                
                // Determine which map to load (Target ID or First Available)
                let mapToLoad = maps[0].id;
                
                if (targetId) {
                    const targetMap = maps.find(m => m.id === targetId);
                    if (targetMap) {
                        mapToLoad = targetMap.id;
                        mapSelect.value = targetMap.id;
                    }
                }

                // 6. Load the map
                setTimeout(() => {
                    editorWidget = window.mapComponents['editor-widget'];
                    if (editorWidget) {
                        editorWidget.loadMapById(mapToLoad);
                    }
                }, 100);

            } catch (err) {
                console.error('Initialization error:', err);
                alert('Failed to initialize: ' + err.message);
            }
        }

        // Handle Map Switching
        mapSelect.addEventListener('change', (e) => {
            const mapId = e.target.value; 
            if (mapId && editorWidget) {
                editorWidget.loadMapById(mapId);
            }
        });

        // Handle Save View
        saveBtn.addEventListener('click', async () => {
            editorWidget = window.mapComponents['editor-widget'];
            if (editorWidget) {
                try {
                    await editorWidget.saveCurrentView();
                    alert("View saved successfully!");
                } catch (err) {
                    alert('Error saving view: ' + err.message);
                }
            } else {
                alert("Map widget not ready.");
            }
        });

        // Run
        init();
    </script>
</body>
</html>
