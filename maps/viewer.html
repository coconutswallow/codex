---
layout: default
title: Map Viewer
---

<style>
    /* Force the widget to have a height, preventing desktop collapse */
    #viewer-widget {
        width: 100%;
        height: 80vh;      /* 80% of the screen height */
        min-height: 600px; /* Minimum height for smaller desktop screens */
        background: #222;  /* Dark background so you can see if it loads */
        border-radius: 8px;
        position: relative;
        z-index: 1;
        display: none;     /* Hidden until fully loaded */
    }

    /* Spinner styles */
    #loading-container {
        text-align: center;
        padding: 50px;
    }
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
      crossorigin=""/>

<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div style="margin-bottom: 1rem;">
                <h1 id="map-title" style="display:inline-block;">Map Viewer</h1>
                <p id="map-description" class="text-muted" style="margin-bottom: 0;"></p>
            </div>

            <div id="loading-container">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2">Loading Map Data...</p>
            </div>

            <div id="viewer-widget" 
                 data-map-component 
                 data-editable="false">
            </div>
            
            <div style="margin-top: 15px;">
                <a href="/maps/" class="btn btn-secondary">&larr; Back to Maps</a>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
        crossorigin=""></script>

<script type="module">
    import { initMapComponents } from '../assets/js/map-widget.js';

    // Initialize the widget logic
    initMapComponents();

    const loading = document.getElementById('loading-container');
    const mapTitle = document.getElementById('map-title');
    const mapDesc = document.getElementById('map-description');
    const widgetContainer = document.getElementById('viewer-widget');

    // LISTENER: Wait for map-widget.js to say it's ready
    widgetContainer.addEventListener('maploaded', (e) => {
        const mapData = e.detail;
        
        // Update text
        if (mapData && mapData.name) {
            mapTitle.textContent = mapData.name;
            if(mapData.description) mapDesc.textContent = mapData.description;
        }

        // Hide loader and show map
        loading.style.display = 'none';
        widgetContainer.style.display = 'block';

        // CRITICAL FIX: Leaflet needs to know its container size changed
        // We wait 100ms for the display:block to take effect, then resize
        setTimeout(() => {
            const widget = window.mapComponents['viewer-widget'];
            if (widget && widget.map) {
                widget.map.invalidateSize();
            }
        }, 100);
    });

    function loadFromUrl() {
        // Find the registered widget
        const viewerWidget = window.mapComponents['viewer-widget'];
        
        if (!viewerWidget) {
            setTimeout(loadFromUrl, 50); // Keep checking
            return;
        }

        // Get identifier from URL (?map=Name or #Name)
        const params = new URLSearchParams(window.location.search);
        const identifier = params.get('map') || window.location.hash.substring(1);

        if (identifier) {
            // Load the map
            if (!isNaN(identifier) && identifier.trim() !== "") {
                viewerWidget.loadMapById(parseInt(identifier));
            } else {
                viewerWidget.loadMapByName(identifier);
            }
        } else {
            loading.innerHTML = '<p class="text-danger">No map specified.<br>Use ?map=Name</p>';
        }
    }

    // Start on load
    window.addEventListener('DOMContentLoaded', loadFromUrl);
</script>
