<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Embed</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* Reset margins so the map fills the iframe perfectly */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #222; }
        
        /* The container for the map */
        #viewer-widget { width: 100%; height: 100%; display: none; }

        /* Loading Spinner Overlay */
        #loading-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #eee; font-family: sans-serif; z-index: 1000;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #444;
            border-top: 4px solid #3498db; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-container">
        <div class="spinner"></div>
        <p style="margin-top:15px;">Loading Map...</p>
    </div>

    <div id="viewer-widget" data-map-component data-editable="false"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initMapComponents } from '/codex/assets/js/map-widget.js';
        
        // Initialize logic immediately
        initMapComponents();

        const widgetContainer = document.getElementById('viewer-widget');
        const loading = document.getElementById('loading-container');

        // 1. Listen for 'maploaded' from map-widget.js to hide spinner
        widgetContainer.addEventListener('maploaded', (e) => {
            loading.style.display = 'none';
            widgetContainer.style.display = 'block';
            
            // Resize fix ensures map tiles render correctly
            const widget = window.mapComponents['viewer-widget'];
            if(widget && widget.map) { 
                setTimeout(() => widget.map.invalidateSize(), 100); 
            }
        });

        // 2. Load map based on URL param ?map=Name
        function loadMap() {
            const widget = window.mapComponents ? window.mapComponents['viewer-widget'] : null;
            if (!widget) { setTimeout(loadMap, 50); return; }

            const params = new URLSearchParams(window.location.search);
            const mapName = params.get('map'); // e.g. Ansalon

            if (mapName) {
                if (!isNaN(mapName)) widget.loadMapById(parseInt(mapName));
                else widget.loadMapByName(mapName);
            }
        }
        
        window.addEventListener('DOMContentLoaded', loadMap);
    </script>
</body>
</html>
