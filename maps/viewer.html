<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Embed</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* 1. Reset everything so the map fills the iframe exactly */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #222; }
        
        /* 2. The Map Container */
        #viewer-widget { width: 100%; height: 100%; display: none; }

        /* 3. The Loading Spinner */
        #loading-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #eee; font-family: sans-serif;
            z-index: 1000;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #444;
            border-top: 4px solid #3498db; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-container">
        <div class="spinner"></div>
        <p style="margin-top:15px;">Loading Map...</p>
    </div>

    <div id="viewer-widget" data-map-component data-editable="false"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initMapComponents } from '../assets/js/map-widget.js';
        
        // Start the engine
        initMapComponents();

        const widgetContainer = document.getElementById('viewer-widget');
        const loading = document.getElementById('loading-container');

        // 1. Listen for the map to finish loading
        widgetContainer.addEventListener('maploaded', (e) => {
            loading.style.display = 'none';
            widgetContainer.style.display = 'block';
            
            // Resize fix
            const widget = window.mapComponents['viewer-widget'];
            if(widget && widget.map) { 
                setTimeout(() => widget.map.invalidateSize(), 100); 
            }
        });

        // 2. Load map based on URL param ?map=Name
        function loadMap() {
            const widget = window.mapComponents['viewer-widget'];
            if (!widget) { setTimeout(loadMap, 50); return; }

            const params = new URLSearchParams(window.location.search);
            const mapName = params.get('map');

            if (mapName) {
                // Determine if ID (number) or Name (string)
                if (!isNaN(mapName)) widget.loadMapById(parseInt(mapName));
                else widget.loadMapByName(mapName);
            } else {
                loading.innerHTML = "<p style='color:red'>No map name provided.</p>";
            }
        }
        
        window.addEventListener('DOMContentLoaded', loadMap);
    </script>
</body>
</html>
