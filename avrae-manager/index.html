<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Avrae Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        :root {
            --bg: #2c2f33;
            --panel: #23272a;
            --text: #ffffff;
            --blur: #99aab5;
            --accent: #5865f2;
            --danger: #ed4245;
            --success: #57f287;
            --input-bg: #40444b;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background: var(--panel);
            padding: 5px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
            height: 40px;
        }

        .header h3 {
            font-size: 0.9em;
            margin: 0;
            color: var(--accent);
        }

        .menu-container {
            position: relative;
        }

        .hamburger {
            cursor: pointer;
            font-size: 1.5em;
            padding: 0 10px;
        }

        .menu-dropdown {
            position: absolute;
            right: 0;
            top: 35px;
            background: var(--panel);
            border: 1px solid #444;
            border-radius: 4px;
            display: none;
            flex-direction: column;
            gap: 5px;
            padding: 10px;
            z-index: 100;
            min-width: 180px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .menu-dropdown.active {
            display: flex;
        }

        .menu-dropdown button {
            text-align: left;
            width: 100%;
            font-size: 0.8em;
            padding: 8px;
            background: #40444b;
            color: white;
            margin-bottom: 2px;
            border: none;
            cursor: pointer;
        }

        .menu-dropdown button:hover {
            background: #4f545c;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 500px;
            background: var(--panel);
            overflow-y: auto;
            padding: 15px;
            border-right: 1px solid #444;
            display: flex;
            flex-direction: column;
        }

        .map-area {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            background: #1a1c1e;
            overflow: auto;
            padding: 10px;
        }

        .tab-bar {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            border-bottom: 1px solid #444;
        }

        .tab {
            padding: 6px 10px;
            cursor: pointer;
            background: #40444b;
            border-radius: 4px 4px 0 0;
            font-size: 0.75em;
            font-weight: bold;
        }

        .tab.active {
            background: var(--accent);
        }

        .tab-content {
            display: none;
            flex: 1;
        }

        .tab-content.active {
            display: block;
        }

        .control-strip {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
            background: #2f3136;
            padding: 8px;
            border-radius: 4px;
        }

        .control-strip button {
            flex: 1;
            padding: 6px;
            font-size: 0.75em;
            background: #4f545c;
            color: white;
            border-radius: 3px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .control-strip button:hover {
            background: #5d6269;
        }

        .grid-row {
            display: grid;
            grid-template-columns: 25px 1.5fr 1fr 40px;
            gap: 8px;
            margin-bottom: 6px;
            padding: 8px;
            background: #2f3136;
            border-radius: 4px;
            border-left: 3px solid transparent;
            align-items: end;
            position: relative;
        }

        .npc-row,
        .monster-row {
            grid-template-columns: 25px 0.8fr 1.5fr 1fr 40px;
        }

        .player-row {
            border-left-color: var(--accent);
        }

        .npc-row {
            border-left-color: #fee75c;
        }

        .monster-row {
            border-left-color: var(--danger);
        }

        input[type="text"],
        input[type="number"] {
            background: var(--input-bg);
            border: 1px solid #222;
            color: white;
            padding: 4px;
            border-radius: 3px;
            width: 100%;
            font-size: 0.85em;
            box-sizing: border-box;
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            margin-bottom: 6px;
        }

        .select-all-box {
            margin-bottom: 0 !important;
        }

        label {
            font-size: 0.6em;
            color: var(--blur);
            text-transform: uppercase;
            display: block;
            margin-bottom: 2px;
        }

        /* AUTOCOMPLETE STYLES */
        .autocomplete-list {
            position: absolute;
            border: 1px solid #444;
            border-bottom: none;
            border-top: none;
            z-index: 999;
            top: 100%;
            left: 5px;
            right: 0;
            background-color: var(--panel);
            max-height: 200px;
            overflow-y: auto;
            border-radius: 0 0 4px 4px;
            width: 95%;
        }

        .autocomplete-item {
            padding: 8px;
            cursor: pointer;
            background-color: #2f3136;
            border-bottom: 1px solid #444;
            font-size: 0.85em;
            color: #ccc;
        }

        .autocomplete-item:hover {
            background-color: var(--accent);
            color: white;
        }

        .autocomplete-item strong {
            color: white;
        }

        .output-box {
            background: #000;
            color: var(--success);
            padding: 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.75em;
            margin-top: 5px;
            border: 1px solid #333;
            cursor: pointer;
            word-break: break-all;
            position: relative;
        }

        .btn-group {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .move-btn {
            background: #4f545c;
            color: white;
            padding: 6px 10px;
            font-size: 0.9em;
            border-radius: 4px;
            width: 40px;
            border: none;
            cursor: pointer;
        }

        canvas {
            background: #000;
        }

        @keyframes flash-white {
            0% {
                background-color: rgba(255, 255, 255, 0.6);
            }

            100% {
                background-color: transparent;
            }
        }

        .clicked-flash {
            animation: flash-white 0.3s ease-out;
        }

        /* MODAL STYLES */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--panel);
            padding: 20px;
            border-radius: 5px;
            border: 1px solid #444;
            width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .modal-header {
            font-size: 1.2em;
            color: var(--accent);
            margin-bottom: 15px;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }

        .modal-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        .modal-table th {
            text-align: left;
            color: var(--blur);
            font-size: 0.7em;
            text-transform: uppercase;
            padding: 5px;
            border-bottom: 1px solid #444;
        }

        .modal-table td {
            padding: 5px;
            vertical-align: middle;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            border-top: 1px solid #444;
            padding-top: 10px;
        }

        .action-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
        }

        .close-btn {
            background: #4f545c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="header">
        <h3>Avrae Manager</h3>
        <div style="display:flex; align-items:center; gap:15px;">
            <span id="fileStatus" style="font-size:0.7em; color:var(--blur);">Session: Unsaved</span>
            <div class="menu-container">
                <div class="hamburger" onclick="toggleMenu()">☰</div>
                <div id="navMenu" class="menu-dropdown">
                    <!-- Supabase-backed -->
                    <button onclick="saveSessionToSupabase()">Save Session</button>
                    <button onclick="loadSessionPrompt()">Load Session</button>
                    <button onclick="refreshTokensFromSupabase()">Refresh Tokens</button>
                    <button style="background:var(--danger)" onclick="resetFog()">Reset Fog</button>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="sidebar">
            <div class="tab-bar">
                <div class="tab active" onclick="openTab(event, 'tab-players')">Players</div>
                <div class="tab" onclick="openTab(event, 'tab-npcs')">NPCs</div>
                <div class="tab" onclick="openTab(event, 'tab-monsters')">Monsters</div>
                <div class="tab" onclick="openTab(event, 'tab-config')">Config</div>
            </div>

            <div id="tab-players" class="tab-content active">
                <div class="control-strip">
                    <input type="checkbox" class="select-all-box" title="Select All"
                        onclick="selectAll('player', this.checked)">
                    <button onclick="openTokenModal()">Setup Token</button>
                    <button onclick="clearChecked('player')">Clear</button>
                </div>
                <div id="player-list"></div>
                <label style="margin-top:10px;">FOW Update (New Only)</label>
                <div class="output-box" id="fow-out" onclick="uiFlash(this)">!map -fow ...</div>
                <label style="margin-top:10px;">Auto-Zoom View</label>
                <div class="output-box" id="view-out" onclick="uiFlash(this)">!map -view ...</div>
            </div>

            <div id="tab-npcs" class="tab-content">
                <div class="control-strip">
                    <input type="checkbox" class="select-all-box" title="Select All"
                        onclick="selectAll('npc', this.checked)">
                    <button onclick="openNpcModal()">Add NPC</button>
                    <button onclick="generateNpcTokenCmds()">Setup Token</button>
                    <button onclick="clearChecked('npc')">Clear</button>
                </div>
                <div id="npc-list"></div>
            </div>

            <div id="tab-monsters" class="tab-content">
                <div class="control-strip">
                    <input type="checkbox" class="select-all-box" title="Select All"
                        onclick="selectAll('monster', this.checked)">
                    <button onclick="batchCmd('monster', 'setup-monster')">Setup Monster</button>
                    <button onclick="batchCmd('monster', 'setup-token')">Setup Token</button>
                    <button onclick="clearChecked('monster')">Clear</button>
                </div>
                <div id="monster-list"></div>
            </div>

            <div id="tab-config" class="tab-content">
                <label>Map Image URL</label>
                <input type="text" id="mapImgUrl" placeholder="Paste link..." onchange="loadImage()">
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; margin-top:10px;">
                    <div><label>Width</label><input type="number" id="mapW" value="40" oninput="drawMap()"></div>
                    <div><label>Height</label><input type="number" id="mapH" value="40" oninput="drawMap()"></div>
                    <div><label>Vis</label><input type="number" id="visRange" value="6" oninput="drawMap()"></div>
                </div>
            </div>
        </div>

        <div class="map-area">
            <canvas id="mapCanvas"></canvas>
        </div>
    </div>

    <div id="tokenModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Setup Player Tokens</div>
            <table class="modal-table">
                <thead>
                    <tr>
                        <th style="width: 15%">Name (Ref)</th>
                        <th style="width: 25%">Full Name (Cmd)</th>
                        <th style="width: 15%">Location</th>
                        <th style="width: 10%">Size</th>
                        <th style="width: 35%">Token URL/Code</th>
                    </tr>
                </thead>
                <tbody id="tokenTableBody"></tbody>
            </table>
            <div class="modal-footer">
                <button class="action-btn" onclick="generateTokenCommands()">Output Commands</button>
                <button class="close-btn"
                    onclick="document.getElementById('tokenModal').style.display='none'">Close</button>
            </div>
        </div>
    </div>

    <div id="npcModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Add NPCs</div>
            <table class="modal-table">
                <thead>
                    <tr>
                        <th style="width: 15%">Short</th>
                        <th style="width: 35%">Name</th>
                        <th style="width: 15%">AC</th>
                        <th style="width: 15%">HP</th>
                        <th style="width: 20%">Location</th>
                    </tr>
                </thead>
                <tbody id="npcTableBody"></tbody>
            </table>
            <div class="modal-footer">
                <button class="action-btn" onclick="generateNpcAddCmds()">Generate !i add</button>
                <button class="close-btn"
                    onclick="document.getElementById('npcModal').style.display='none'">Close</button>
            </div>
        </div>
    </div>

    <!-- IMPORTANT: Your logic now lives in /assets/js/avrae/battle-manager.js -->
    <script type="module" src="/assets/js/avrae/battle-manager.js"></script>
</body>

</html>
