---
layout: default
title: Token Library | Battlemaps
---

{% include auth-header.html %}

<link rel="stylesheet" href="/codex/assets/css/style.css">

<style>
    .token-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--palette-bg-card-dark); border-radius: 8px; overflow: hidden; }
    .token-table th { text-align: left; padding: 15px; border-bottom: 2px solid var(--palette-brand-main); color: var(--palette-brand-highlight); }
    .token-table td { padding: 12px; border-bottom: 1px solid rgba(215, 196, 158, 0.1); vertical-align: middle; color: #fff; }
    .token-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 50%; border: 2px solid var(--palette-brand-accent); }
    .add-token-container { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; padding: 0 10px; }
    .code-block { background: #222; padding: 4px 8px; border-radius: 4px; font-family: monospace; color: var(--palette-brand-accent-pop); font-size: 0.85em; word-break: break-all; }

    #details-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000;
    }
    .details-modal { background: var(--palette-bg-card-light); padding: 2rem; border-radius: 12px; width: 400px; color: var(--palette-brand-main); }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid var(--palette-brand-highlight); border-radius: 6px; box-sizing: border-box; }
    .save-btn { background: var(--palette-brand-accent); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; }
</style>

<main class="container">
    <div class="add-token-container">
        <h1>Token Library</h1>
        <button class="trigger-upload save-btn" id="add-token-btn" style="display:none; width: auto;">+ Add New Token</button>
    </div>

    <div id="loading-status" style="padding: 20px; text-align: center;">Loading tokens...</div>

    <table class="token-table" id="token-table" style="display:none;">
        <thead>
            <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Type</th>
                <th>Token Code</th>
            </tr>
        </thead>
        <tbody id="token-list"></tbody>
    </table>
</main>

<div id="details-overlay">
    <div class="details-modal">
        <h3>Token Details</h3>
        <div class="form-group">
            <label>Token Name</label>
            <input type="text" id="t-name" placeholder="Character Name">
        </div>
        <div class="form-group">
            <label>Type</label>
            <select id="t-type">
                <option value="My Characters">My Characters</option>
                <option value="Other Characters">Other Characters</option>
                <option value="Monsters">Monsters</option>
            </select>
        </div>
        <button id="save-token-db" class="save-btn" style="width:100%">Create Token</button>
        <p id="save-status" style="font-size: 0.85em; margin-top: 15px; text-align: center; font-weight: bold;"></p>
    </div>
</div>

<script type="module">
    // --- 2. CORRECTED IMPORT PATH ---
    import { supabase } from '/codex/assets/js/supabaseClient.js';

    const tokenList = document.getElementById('token-list');
    const tokenTable = document.getElementById('token-table');
    const addBtn = document.getElementById('add-token-btn');
    let currentUploadData = null;

    // Hook for auth-header logic
    window.handlePageAuth = (user) => {
        if (user) {
            addBtn.style.display = 'block';
            fetchTokens();
        } else {
            document.getElementById('loading-status').innerHTML = "Please log in with Discord.";
        }
    };

    // 2. Display Table (Sorted by Type)
    async function fetchTokens() {
        const { data, error } = await supabase
            .from('tokens')
            .select(`id, name, type, token_code, freehost_images ( thumb_url )`)
            .order('type', { ascending: true });

        if (error) return console.error(error);

        document.getElementById('loading-status').style.display = 'none';
        tokenTable.style.display = 'table';
        
        tokenList.innerHTML = data.map(token => `
            <tr>
                <td><img src="${token.freehost_images?.thumb_url}" class="token-thumb"></td>
                <td style="font-weight:bold">${token.name}</td>
                <td>${token.type}</td>
                <td><code class="code-block">${token.token_code || ''}</code></td>
            </tr>
        `).join('');
    }

    // 3. Handle Upload Completion
    window.addEventListener('image-upload-complete', (e) => {
        currentUploadData = e.detail; 
        document.getElementById('details-overlay').style.display = 'flex';
    });

    // 3a & 4. Generate Code & Save
    document.getElementById('save-token-db').addEventListener('click', async () => {
        const name = document.getElementById('t-name').value;
        const type = document.getElementById('t-type').value;
        const status = document.getElementById('save-status');

        if (!name) {
            status.style.color = '#ff6b6b';
            status.innerText = "Please enter a name.";
            return;
        }

        status.style.color = 'inherit';
        status.innerText = "Generating token code...";
        
        try {
            // 1. Convert URL to Base64
            const base64Url = btoa(currentUploadData.url);
            
            // 2. Fetch via CORS Proxy to handle the 307 Redirect
            // We use corsproxy.io to wrap the request
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent('https://token.otfbm.io/meta/' + base64Url)}`;
            
            const otfbmResponse = await fetch(proxyUrl);
            
            if (!otfbmResponse.ok) throw new Error("Failed to reach OTFBM via proxy");
            
            const tokenCode = await otfbmResponse.text();

            // 3. Get User ID
            const { data: { user } } = await supabase.auth.getUser();

            // 4. Save to tokens table
            const { error } = await supabase.from('tokens').insert([{
                image_id: currentUploadData.id,
                user_id: user.id,
                name: name,
                type: type,
                token_code: tokenCode.trim() // Clean up any whitespace
            }]);

            if (error) throw error;

            // Success: Close and Refresh
            status.style.color = '#4cd964';
            status.innerText = "Token Created!";
            
            setTimeout(() => {
                document.getElementById('details-overlay').style.display = 'none';
                fetchTokens(); // Refresh the table
            }, 1000);

        } catch (err) {
            console.error("Save Error:", err);
            status.style.color = '#ff6b6b';
            status.innerText = "Error: " + err.message;
        }
    });
</script>

<script src="/codex/assets/js/freeimage-upload.js"></script>
