---
layout: default
title: Token Library | Battlemaps
---

{% include auth-header.html %}

<link rel="stylesheet" href="/codex/assets/css/style.css">
<style>
    /* ... (Existing Styles) ... */
    
    /* 1. Page Padding */
    .page-padding { padding: 0 25px; }

    /* Filter & Search Layout */
    .filter-container { 
        display: flex; 
        flex-wrap: wrap; 
        gap: 15px; 
        margin-bottom: 25px; 
        align-items: center; 
        justify-content: space-between; 
    }

    .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
    
    .filter-btn { 
        background: rgba(215, 196, 158, 0.05); 
        border: 1px solid var(--palette-brand-highlight); 
        color: var(--palette-brand-highlight); 
        padding: 8px 18px; 
        border-radius: 20px; 
        cursor: pointer; 
        transition: all 0.2s; 
        font-family: var(--font-header); 
        font-size: 0.9rem;
    }
    .filter-btn.active, .filter-btn:hover { 
        background: var(--palette-brand-highlight); 
        color: #000; 
        font-weight: bold; 
    }

    /* Search Input Style */
    .search-wrapper { flex-grow: 1; max-width: 300px; position: relative; }
    #token-search {
        width: 100%;
        padding: 8px 15px;
        padding-left: 35px; /* Space for icon */
        border-radius: 20px;
        background: rgba(0,0,0,0.3);
        border: 1px solid var(--palette-brand-highlight);
        color: white;
        font-family: inherit;
        outline: none;
    }
    #token-search:focus { border-color: var(--palette-brand-accent); background: rgba(0,0,0,0.5); }
    
    .search-icon {
        position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
        pointer-events: none; opacity: 0.7; color: var(--palette-brand-highlight);
    }

    /* Grid Layout */
    .category-section { margin-bottom: 45px; }
    .category-header { 
        border-bottom: 2px solid var(--palette-brand-main); 
        margin-bottom: 20px; 
        color: var(--palette-brand-accent-pop); 
        font-family: var(--font-header); 
        display: flex; align-items: center; gap: 10px; 
        text-transform: uppercase; 
    }
    
    .token-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
        gap: 20px; 
    }
    
    .token-card { 
        background: var(--palette-bg-card-dark); 
        border: 1px solid rgba(255,255,255,0.1); 
        border-radius: 10px; 
        padding: 15px; 
        display: flex; 
        align-items: center; 
        gap: 15px; 
        position: relative; 
        transition: transform 0.2s;
    }
    .token-card:hover { border-color: var(--palette-brand-accent); transform: translateY(-2px); }

    .token-thumb { 
        width: 90px; height: 90px; 
        object-fit: cover; 
        border-radius: 50%; 
        border: 3px solid var(--palette-brand-accent); 
        background: #000; 
        flex-shrink: 0; 
    }
    .token-info { flex: 1; overflow: hidden; }
    .token-name { font-weight: bold; font-size: 1.2em; margin-bottom: 8px; color: #fff; }
    
    .code-wrapper { display: flex; align-items: stretch; border-radius: 4px; overflow: hidden; border: 1px solid #333; height: 40px; }
    .token-code { background: #111; color: var(--palette-brand-accent-pop); font-family: monospace; padding: 10px; font-size: 1.4em; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 20px;}
    
    /* Edit Mode Styles */
    .edit-input { background: #000; border: none; color: white; padding: 5px 10px; width: 100%; font-family: monospace; font-size: 1.2em; outline: none; }
    .edit-input::placeholder { color: #555; font-size: 0.8em; }
    
    .copy-btn, .delete-btn, .save-edit-btn { background: #222; border: none; border-left: 1px solid #333; color: #fff; cursor: pointer; width: 44px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .copy-btn:hover { background: #444; }
    .delete-btn:hover { background: #8b0000; }
    .save-edit-btn:hover { background: var(--palette-brand-accent); }
    .copy-btn.copied { background: #4cd964; }
    
    .add-token-container { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
    .save-btn { background: var(--palette-brand-accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    
    #details-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000; }
    .details-modal { background: var(--palette-bg-card-light); padding: 2rem; border-radius: 12px; width: 400px; color: var(--palette-brand-main); }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    .preview-box { text-align: center; margin-bottom: 20px; }
    #t-preview-img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--palette-brand-accent); object-fit: cover; background: #000; }

    /* New Animation for Generating State */
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    .blink { animation: blink 1.5s infinite; }

    @media (max-width: 600px) {
        .filter-container { flex-direction: column-reverse; align-items: stretch; }
        .search-wrapper { max-width: 100%; }
        .page-padding { padding: 0 15px; }
    }
</style>

<main class="container page-padding">
    <div class="add-token-container">
        <h1>Token Library</h1>
        <button class="save-btn" id="add-token-btn" style="display:none;" onclick="openTokenModal()">+ New Token</button>
    </div>

    <div class="filter-container" id="filter-bar" style="display:none;">
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="My Characters">My Characters</button>
            <button class="filter-btn" data-filter="Other Characters">Other Characters</button>
            <button class="filter-btn" data-filter="Monsters">Monsters</button>
        </div>
        
        <div class="search-wrapper">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="token-search" placeholder="Search tokens...">
        </div>
    </div>

    <div id="loading-status" style="padding: 20px; text-align: center;">Loading library...</div>
    <div id="library-container"></div>
</main>

<div id="details-overlay">
    <div class="details-modal">
        <h3>Token Details</h3>
        
        <div style="display:flex; gap:10px; margin-bottom:15px; justify-content: center;">
            <button id="tab-upload" class="filter-btn active" onclick="switchTab('upload')">Upload File</button>
            <button id="tab-url" class="filter-btn" onclick="switchTab('url')">Paste URL</button>
        </div>

        <div class="preview-box">
            <img id="t-preview-img" src="https://placehold.co/120x120?text=Preview" alt="Preview">
        </div>

        <div id="upload-section" style="text-align:center; margin-bottom:15px;">
            <p style="font-size:0.9em; color:#888; margin-bottom:10px;">Supported: JPG, PNG, GIF</p>
            <button class="trigger-upload save-btn" style="background:#444;">Select File</button>
        </div>

        <div id="url-section" class="form-group" style="display:none;">
            <label>Image URL</label>
            <input type="text" id="t-url-input" placeholder="https://example.com/image.png">
        </div>

        <div class="form-group">
            <label>Name</label>
            <input type="text" id="t-name" placeholder="Token Name">
        </div>
        
        <div class="form-group">
            <label>Category</label>
            <select id="t-type">
                <option value="My Characters">My Characters</option>
                <option value="Other Characters">Other Characters</option>
                <option value="Monsters">Monsters</option>
            </select>
        </div>
        <div class="form-group">
            <label>Size</label>
            <select id="t-size">
                <option value="Medium" selected>Medium</option>
                <option value="Small">Small</option>
                <option value="Large">Large</option>
                <option value="Huge">Huge</option>
                <option value="Gargantuan">Gargantuan (4x4)</option>
            </select>
        </div>

        <button id="save-token-db" class="save-btn" style="width:100%">Save Token</button>
        <p id="save-status" style="text-align:center; margin-top:10px; font-weight:bold; font-size:0.9em;"></p>
    </div>
</div>

<script type="module">
    import { supabase } from '/codex/assets/js/supabaseClient.js';

    const container = document.getElementById('library-container');
    const addBtn = document.getElementById('add-token-btn');
    const searchInput = document.getElementById('token-search');
    
    // UI State
    let currentUploadUrl = null; // Stores URL from either upload or paste
    let allTokensData = []; 
    let activeFilter = 'all';
    let searchTerm = '';

    window.handlePageAuth = (user) => {
        if (user) {
            addBtn.style.display = 'block';
            document.getElementById('filter-bar').style.display = 'flex';
            fetchTokens();
        } else {
            document.getElementById('loading-status').innerHTML = "Please login to view tokens.";
        }
    };

    async function fetchTokens() {
        // Fetch tokens, filtering out NULL or Empty image_urls
        const { data, error } = await supabase
            .from('tokens')
            .select('id, name, type, token_code, image_url, created_at')
            .not('image_url', 'is', null)  // 1. Exclude NULLs
            .neq('image_url', '')          // 2. Exclude empty strings
            .order('created_at', { ascending: false });

        if (error) {
            console.error(error);
            document.getElementById('loading-status').innerText = "Error loading tokens.";
            return;
        }

        document.getElementById('loading-status').style.display = 'none';
        
        // Map data (No longer need to process freehost_images array)
        allTokensData = data.map(token => {
            return { ...token, safeImg: token.image_url };
        });

        applyFilters();
    }

    // --- 2. Filter & Render (Unchanged logic, kept for context) ---
    function applyFilters() {
        const filtered = allTokensData.filter(t => {
            const matchesCategory = activeFilter === 'all' || t.type === activeFilter;
            const matchesSearch = t.name.toLowerCase().includes(searchTerm.toLowerCase());
            return matchesCategory && matchesSearch;
        });

        const grouped = { "My Characters": [], "Other Characters": [], "Monsters": [], "Misc": [] };
        filtered.forEach(t => {
            if (grouped[t.type]) grouped[t.type].push(t);
            else grouped["Misc"].push(t);
        });
        renderSections(grouped);
    }

    function renderSections(groupedTokens) {
        container.innerHTML = ''; 
        let hasContent = false;

        for (const [type, tokens] of Object.entries(groupedTokens)) {
            if (tokens.length === 0) continue;
            hasContent = true;

            const section = document.createElement('div');
            section.className = `category-section`;
            section.innerHTML = `<h3 class="category-header">${type} <span style="font-size:0.6em; opacity:0.6; margin-left:auto;">${tokens.length}</span></h3>`;
            
            const grid = document.createElement('div');
            grid.className = 'token-grid';
            
            // Render Cards
            grid.innerHTML = tokens.map(t => {
                let codeHtml = '';
                if (t.token_code === 'Generating...') {
                    codeHtml = `<div class="token-code" style="color:#888; font-style:italic;"><span class="blink">Generating...</span></div>`;
                } else if (t.token_code) {
                    codeHtml = `
                        <div class="token-code" title="${t.token_code}">${t.token_code}</div>
                        <button class="copy-btn" onclick="copyToClipboard('${t.token_code}', this)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>`;
                } else {
                    codeHtml = `
                        <input type="text" class="edit-input" id="input-${t.id}" placeholder="Paste code...">
                        <button class="save-edit-btn" onclick="saveManualCode('${t.id}')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path></svg>
                        </button>`;
                }

                return `
                <div class="token-card">
                    <img src="${t.safeImg}" class="token-thumb" onerror="this.src='https://placehold.co/100x100?text=Error'">
                    <div class="token-info">
                        <div class="token-name">${t.name}</div>
                        <div class="code-wrapper">
                            ${codeHtml}
                            <button class="delete-btn" onclick="deleteToken('${t.id}')">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff4d4d" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            section.appendChild(grid);
            container.appendChild(section);
        }

        if(!hasContent) container.innerHTML = `<div style="text-align:center; padding:40px; color:#666;">No tokens found.</div>`;
    }

    // --- 3. UI Helpers (Modal & Tabs) ---
    window.openTokenModal = () => {
        document.getElementById('details-overlay').style.display = 'flex';
        // Reset fields
        document.getElementById('t-name').value = "";
        document.getElementById('t-url-input').value = "";
        document.getElementById('t-size').value = "Medium";
        document.getElementById('t-preview-img').src = "https://placehold.co/120x120?text=Preview";
        document.getElementById('save-status').innerText = "";
        currentUploadUrl = null;
    };

    window.switchTab = (mode) => {
        const uploadSec = document.getElementById('upload-section');
        const urlSec = document.getElementById('url-section');
        const btnUpload = document.getElementById('tab-upload');
        const btnUrl = document.getElementById('tab-url');

        if (mode === 'upload') {
            uploadSec.style.display = 'block';
            urlSec.style.display = 'none';
            btnUpload.classList.add('active');
            btnUrl.classList.remove('active');
        } else {
            uploadSec.style.display = 'none';
            urlSec.style.display = 'block';
            btnUpload.classList.remove('active');
            btnUrl.classList.add('active');
        }
    };

    // Listen for manual URL input to update preview
    document.getElementById('t-url-input').addEventListener('input', (e) => {
        const url = e.target.value.trim();
        if(url) {
            document.getElementById('t-preview-img').src = url;
            currentUploadUrl = url;
        }
    });

    // Listen for FreeImage upload completion
    window.addEventListener('image-upload-complete', (e) => {
        // e.detail contains { url, thumb, etc } from freeimage-upload.js
        currentUploadUrl = e.detail.url; 
        document.getElementById('t-preview-img').src = currentUploadUrl;
        document.getElementById('save-status').innerText = "Image uploaded successfully!";
        document.getElementById('save-status').style.color = "#4cd964";
    });

    // --- 4. Save Logic (Unified) ---
    document.getElementById('save-token-db').addEventListener('click', async () => {
        const name = document.getElementById('t-name').value;
        const type = document.getElementById('t-type').value;
        const status = document.getElementById('save-status');
        const size = document.getElementById('t-size').value;

        if (!name) { alert("Please enter a name."); return; }
        if (!currentUploadUrl) { alert("Please upload an image or paste a URL."); return; }

        status.innerText = "Saving...";
        status.style.color = "#fff";

        try {
            const { data: { user } } = await supabase.auth.getUser();

            // Insert directly into tokens (no more freehost_images dependency)
            const { data: insertedData, error } = await supabase.from('tokens').insert([{
                user_id: user.id,
                name: name,
                type: type,
                size: size,
                image_url: currentUploadUrl, // Storing the URL directly
                token_code: 'Generating...'
            }]).select().single();

            if (error) throw error;

            document.getElementById('details-overlay').style.display = 'none';
            await fetchTokens(); 

            // Trigger Edge Function
            supabase.functions.invoke('update-token-code', {
                body: { 
                    record_id: insertedData.id, 
                    image_url: currentUploadUrl 
                }
            }).then(() => fetchTokens());

        } catch (err) {
            status.style.color = '#ff6b6b';
            status.innerText = "Error: " + err.message;
        }
    });

    // --- 5. Utilities (Copy, Delete, Manual Save) ---
    window.copyToClipboard = (text, btnElement) => {
        if (!text) return;
        let textToCopy = text.length > 15 ? `https://token.otfbm.io/token/${text}` : text;
        navigator.clipboard.writeText(textToCopy).then(() => {
            const original = btnElement.innerHTML;
            btnElement.classList.add('copied');
            btnElement.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            setTimeout(() => { btnElement.classList.remove('copied'); btnElement.innerHTML = original; }, 1500);
        });
    };

    window.deleteToken = async (id) => {
        if (!confirm("Delete this token?")) return;
        await supabase.from('tokens').delete().eq('id', id);
        fetchTokens();
    };

    window.saveManualCode = async (id) => {
        const val = document.getElementById(`input-${id}`).value.trim();
        if (val) {
            await supabase.from('tokens').update({ token_code: val }).eq('id', id);
            fetchTokens();
        }
    };
    
    // Listeners
    searchInput.addEventListener('input', (e) => { searchTerm = e.target.value; applyFilters(); });
    document.querySelectorAll('.filter-container .filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            if(e.target.id.includes('tab')) return; // Ignore tabs
            document.querySelectorAll('.filter-container .filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            activeFilter = e.target.dataset.filter;
            applyFilters();
        });
    });
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') document.getElementById('details-overlay').style.display = 'none';
    });
</script>

<script src="/codex/assets/js/freeimage-upload.js"></script>
