---
layout: default
title: Token Library | Battlemaps
---

{% include auth-header.html %}

<link rel="stylesheet" href="/codex/assets/css/style.css">
<style>
    /* Layout & Filtering */
    .filter-bar { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
    .filter-btn { background: rgba(215, 196, 158, 0.05); border: 1px solid var(--palette-brand-highlight); color: var(--palette-brand-highlight); padding: 8px 18px; border-radius: 20px; cursor: pointer; transition: all 0.2s; font-family: var(--font-header); }
    .filter-btn.active, .filter-btn:hover { background: var(--palette-brand-highlight); color: #000; font-weight: bold; }
    
    /* Category Sections */
    .category-section { margin-bottom: 45px; display: none; }
    .category-section.visible { display: block; }
    .category-header { border-bottom: 2px solid var(--palette-brand-main); margin-bottom: 20px; color: var(--palette-brand-accent-pop); font-family: var(--font-header); display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
    
    /* Token Cards */
    .token-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .token-card { background: var(--palette-bg-card-dark); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 15px; display: flex; align-items: center; gap: 15px; position: relative; }
    .token-thumb { width: 90px; height: 90px; object-fit: cover; border-radius: 50%; border: 3px solid var(--palette-brand-accent); background: #000; flex-shrink: 0; }
    .token-info { flex: 1; overflow: hidden; }
    .token-name { font-weight: bold; font-size: 1.2em; margin-bottom: 8px; color: #fff; }
    
    /* Code UI */
    .code-wrapper { display: flex; align-items: stretch; border-radius: 4px; overflow: hidden; border: 1px solid #333; }
    .token-code { background: #111; color: var(--palette-brand-accent-pop); font-family: monospace; padding: 10px; font-size: 1.4em; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    /* Buttons */
    .copy-btn, .delete-btn { background: #222; border: none; border-left: 1px solid #333; color: #fff; cursor: pointer; width: 44px; display: flex; align-items: center; justify-content: center; }
    .copy-btn:hover { background: #444; }
    .delete-btn:hover { background: #8b0000; }
    .copy-btn.copied { background: #4cd964; }
    .add-token-container { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
    .save-btn { background: var(--palette-brand-accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    
    /* Modal */
    #details-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000; }
    .details-modal { background: var(--palette-bg-card-light); padding: 2rem; border-radius: 12px; width: 400px; color: var(--palette-brand-main); }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    .preview-box { text-align: center; margin-bottom: 20px; }
    #t-preview-img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--palette-brand-accent); object-fit: cover; background: #000; }
</style>

<main class="container">
    <div class="add-token-container">
        <h1>Token Library</h1>
        <button class="trigger-upload save-btn" id="add-token-btn" style="display:none;">+ New Token</button>
    </div>

    <div class="filter-bar" id="filter-bar" style="display:none;">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="My Characters">My Characters</button>
        <button class="filter-btn" data-filter="Other Characters">Other Characters</button>
        <button class="filter-btn" data-filter="Monsters">Monsters</button>
    </div>

    <div id="loading-status" style="padding: 20px; text-align: center;">Loading library...</div>
    <div id="library-container"></div>
</main>

<div id="details-overlay">
    <div class="details-modal">
        <h3>Token Details</h3>
        <div class="preview-box"><img id="t-preview-img" src="" alt="Preview"></div>
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="t-name" placeholder="Name">
        </div>
        <div class="form-group">
            <label>Category</label>
            <select id="t-type">
                <option value="My Characters">My Characters</option>
                <option value="Other Characters">Other Characters</option>
                <option value="Monsters">Monsters</option>
            </select>
        </div>
        <button id="save-token-db" class="save-btn" style="width:100%">Save Token</button>
        <p id="save-status" style="text-align:center; margin-top:10px; font-weight:bold;"></p>
    </div>
</div>

<script type="module">
    import { supabase } from '/codex/assets/js/supabaseClient.js';

    const container = document.getElementById('library-container');
    const addBtn = document.getElementById('add-token-btn');
    let currentUploadData = null;

    // --- 1. Realtime Listener: Updates the UI when the Edge Function finishes ---
    const channel = supabase
        .channel('public:tokens')
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'tokens' }, (payload) => {
            console.log('Token updated by Edge Function:', payload);
            fetchTokens(); // Refresh the grid automatically
        })
        .subscribe();

    window.handlePageAuth = (user) => {
        if (user) {
            addBtn.style.display = 'block';
            document.getElementById('filter-bar').style.display = 'flex';
            fetchTokens();
        } else {
            document.getElementById('loading-status').innerHTML = "Please login to view tokens.";
        }
    };

    async function fetchTokens() {
        const { data, error } = await supabase
            .from('tokens')
            .select(`
                id, name, type, token_code, image_id,
                freehost_images ( image_url ) 
            `)
            .order('name', { ascending: true });

        if (error) {
            console.error("Supabase Error:", error);
            document.getElementById('loading-status').innerText = "Error loading tokens.";
            return;
        }

        document.getElementById('loading-status').style.display = 'none';

        const grouped = { "My Characters": [], "Other Characters": [], "Monsters": [] };

        data.forEach(token => {
            // Robust check for Image Join (handles Array or Object)
            const imgData = token.freehost_images;
            let displayImg = 'https://placehold.co/100x100?text=No+Img';

            if (imgData) {
                if (Array.isArray(imgData) && imgData.length > 0) displayImg = imgData[0].image_url;
                else if (imgData.image_url) displayImg = imgData.image_url;
            }

            const tokenObj = { ...token, safeImg: displayImg };

            if (grouped[token.type]) grouped[token.type].push(tokenObj);
            else { if(!grouped["Misc"]) grouped["Misc"] = []; grouped["Misc"].push(tokenObj); }
        });

        renderSections(grouped);
    }

    function renderSections(groupedTokens) {
        container.innerHTML = ''; 
        for (const [type, tokens] of Object.entries(groupedTokens)) {
            if (tokens.length === 0) continue;
            const section = document.createElement('div');
            section.className = `category-section visible`;
            section.dataset.category = type;
            section.innerHTML = `<h3 class="category-header">${type} <span style="font-size:0.6em; opacity:0.6; margin-left:auto;">${tokens.length}</span></h3>`;
            
            const grid = document.createElement('div');
            grid.className = 'token-grid';
            grid.innerHTML = tokens.map(t => `
                <div class="token-card">
                    <img src="${t.safeImg}" class="token-thumb" onerror="this.src='https://placehold.co/100x100?text=Error'">
                    <div class="token-info">
                        <div class="token-name">${t.name}</div>
                        <div class="code-wrapper">
                            <div class="token-code" style="${t.token_code === 'Generating...' ? 'color:orange; font-style:italic;' : ''}">
                                ${t.token_code || '---'}
                            </div>
                            <button class="copy-btn" onclick="copyToClipboard('${t.token_code || ''}', this)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                            <button class="delete-btn" onclick="deleteToken('${t.id}', '${t.image_id}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff4d4d" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                        </div>
                    </div>
                </div>
            `).join('');
            section.appendChild(grid);
            container.appendChild(section);
        }
    }

    // --- Actions ---

    window.copyToClipboard = (text, btnElement) => {
        if (!text || text === 'Generating...') return;
        navigator.clipboard.writeText(text).then(() => {
            const originalHTML = btnElement.innerHTML;
            btnElement.classList.add('copied');
            btnElement.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            setTimeout(() => { btnElement.classList.remove('copied'); btnElement.innerHTML = originalHTML; }, 1500);
        });
    };

    window.deleteToken = async (tokenId, imageId) => {
        if (!confirm("Are you sure you want to delete this token?")) return;
        try {
            await supabase.from('tokens').delete().eq('id', tokenId);
            if (imageId) await supabase.from('freehost_images').delete().eq('id', imageId);
            fetchTokens(); 
        } catch (err) { alert(err.message); }
    };

    window.addEventListener('image-upload-complete', (e) => {
        currentUploadData = e.detail;
        document.getElementById('t-preview-img').src = currentUploadData.url; 
        document.getElementById('t-name').value = ""; 
        document.getElementById('details-overlay').style.display = 'flex';
    });

    // --- 2. Save Logic: Uses Edge Function ---
    document.getElementById('save-token-db').addEventListener('click', async () => {
        const name = document.getElementById('t-name').value;
        const type = document.getElementById('t-type').value;
        const status = document.getElementById('save-status');
        
        if (!name) { alert("Please enter a name."); return; }

        status.innerText = "Saving...";
        
        try {
            const { data: { user } } = await supabase.auth.getUser();
            
            // A. Insert row immediately with "Generating..."
            const { data: insertedToken, error } = await supabase.from('tokens').insert([{
                image_id: currentUploadData.id,
                user_id: user.id,
                name: name,
                type: type,
                token_code: 'Generating...' 
            }]).select().single();

            if (error) throw error;

            // B. Trigger the Edge Function (This runs on the server, solving CORS!)
            // Make sure your function name here matches EXACTLY what you named it in Supabase
            const { error: funcError } = await supabase.functions.invoke('update-token-code', {
                body: { 
                    record_id: insertedToken.id, 
                    image_url: currentUploadData.url 
                }
            });

            if (funcError) {
                console.error("Edge Function Error:", funcError);
                // We don't throw here so the modal still closes, 
                // but you might want to alert the user if strict
            }

            // C. Close Modal immediately
            document.getElementById('details-overlay').style.display = 'none';
            fetchTokens(); // Show the new card immediately

        } catch (err) {
            status.style.color = '#ff6b6b';
            status.innerText = "Error: " + err.message;
        }
    });

    // Filtering & Escape
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            const filter = e.target.dataset.filter;
            document.querySelectorAll('.category-section').forEach(sec => {
                sec.style.display = (filter === 'all' || sec.dataset.category === filter) ? 'block' : 'none';
            });
        });
    });
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') document.getElementById('details-overlay').style.display = 'none';
    });
</script>

<script src="/codex/assets/js/freeimage-upload.js"></script>
