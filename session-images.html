---
layout: default
title: Session Assets | Library
---

{% include auth-header.html %}

<link rel="stylesheet" href="/codex/assets/css/style.css">
<style>
    /* --- Page Layout --- */
    .page-padding { padding: 0 25px; }

    .header-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 20px 0;
        flex-wrap: wrap;
        gap: 15px;
    }

    /* --- Search Bar --- */
    .search-wrapper { 
        position: relative; 
        width: 100%; 
        max-width: 400px; 
    }
    #img-search {
        width: 100%;
        padding: 10px 15px 10px 40px;
        border-radius: 20px;
        background: rgba(0,0,0,0.3);
        border: 1px solid var(--palette-brand-highlight);
        color: white;
        font-family: inherit;
        outline: none;
    }
    #img-search:focus { border-color: var(--palette-brand-accent); background: rgba(0,0,0,0.5); }
    
    .search-icon {
        position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
        pointer-events: none; opacity: 0.7; color: var(--palette-brand-highlight);
    }

    /* --- Grid Layout --- */
    .asset-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
        gap: 20px; 
        margin-top: 20px;
    }
    
    .asset-card { 
        background: var(--palette-bg-card-dark); 
        border: 1px solid rgba(255,255,255,0.1); 
        border-radius: 8px; 
        overflow: hidden;
        transition: transform 0.2s, border-color 0.2s;
        display: flex;
        flex-direction: column;
    }
    .asset-card:hover { 
        border-color: var(--palette-brand-accent); 
        transform: translateY(-3px); 
    }

    .asset-thumb-container {
        width: 100%;
        height: 150px;
        background: #000;
        overflow: hidden;
        cursor: pointer;
        position: relative;
    }
    
    .asset-thumb { 
        width: 100%; 
        height: 100%; 
        object-fit: cover; 
        transition: opacity 0.2s;
    }
    .asset-thumb:hover { opacity: 0.8; }

    .asset-info { 
        padding: 12px; 
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }
    
    .asset-name { 
        font-weight: bold; 
        color: #fff; 
        margin-bottom: 5px; 
        white-space: nowrap; 
        overflow: hidden; 
        text-overflow: ellipsis; 
    }
    
    .asset-tags {
        font-size: 0.8em;
        color: #888;
        font-style: italic;
        margin-bottom: 10px;
        height: 1.2em; /* limit to 1 line approx */
        overflow: hidden;
    }

    /* --- Buttons --- */
    .btn-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: auto;}
    
    .icon-btn { 
        background: transparent; 
        border: none; 
        color: #aaa; 
        cursor: pointer; 
        padding: 4px;
        transition: color 0.2s; 
    }
    .icon-btn:hover { color: #fff; }
    .delete-btn:hover { color: #ff4d4d; }

    .save-btn { 
        background: var(--palette-brand-accent); 
        color: white; 
        border: none; 
        padding: 8px 16px; 
        border-radius: 6px; 
        cursor: pointer; 
        font-weight: bold; 
        font-family: var(--font-header);
    }
    .save-btn:hover { opacity: 0.9; }

    /* --- Overlays (Add Modal & Lightbox) --- */
    .overlay { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0,0,0,0.9); 
        display: none; 
        justify-content: center; 
        align-items: center; 
        z-index: 2000; 
        backdrop-filter: blur(4px);
    }
    
    /* Add Modal */
    .details-modal { 
        background: var(--palette-bg-card-light); 
        padding: 2rem; 
        border-radius: 12px; 
        width: 90%; max-width: 400px; 
        color: var(--palette-brand-main); 
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; margin-bottom: 0.4rem; font-weight: bold; font-size: 0.9em;}
    .form-group input { 
        width: 100%; padding: 10px; 
        border: 1px solid #ccc; border-radius: 6px; 
    }
    .preview-box { text-align: center; margin-bottom: 20px; }
    #preview-img { 
        max-width: 100px; max-height: 100px; 
        border: 2px solid var(--palette-brand-accent); 
        border-radius: 4px; 
    }

    /* Lightbox */
    .lightbox-content {
        max-width: 90%;
        max-height: 90vh;
        border: 2px solid #333;
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }
    .lightbox-close {
        position: absolute; top: 20px; right: 30px;
        color: white; font-size: 30px; cursor: pointer;
    }

</style>

<main class="container page-padding">
    <div class="header-actions">
        <h1>Session Assets</h1>
        
        <div class="search-wrapper">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="img-search" placeholder="Search by name or tags...">
        </div>

        <button class="trigger-upload save-btn" id="add-asset-btn" style="display:none;">+ Add Asset</button>
    </div>

    <div id="loading-status" style="padding: 20px; text-align: center;">Loading assets...</div>
    <div id="asset-container" class="asset-grid"></div>
</main>

<div id="add-overlay" class="overlay">
    <div class="details-modal">
        <h3>New Asset</h3>
        <div class="preview-box"><img id="preview-img" src=""></div>
        
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="inp-name" placeholder="e.g. Forest Clearing">
        </div>
        
        <div class="form-group">
            <label>Search Keys (Tags)</label>
            <input type="text" id="inp-tags" placeholder="e.g. nature, battlemap, day">
        </div>
        
        <button id="save-db-btn" class="save-btn" style="width:100%">Save to Library</button>
        <p id="save-status" style="text-align:center; margin-top:10px; font-size: 0.9em;"></p>
        <button onclick="closeAddModal()" style="width:100%; margin-top:10px; background:transparent; border:none; color:#666; cursor:pointer;">Cancel</button>
    </div>
</div>

<div id="lightbox-overlay" class="overlay" onclick="closeLightbox()">
    <span class="lightbox-close">&times;</span>
    <img id="lightbox-img" class="lightbox-content">
</div>

<script type="module">
    import { supabase } from '/codex/assets/js/supabaseClient.js';

    const container = document.getElementById('asset-container');
    const addBtn = document.getElementById('add-asset-btn');
    const searchInput = document.getElementById('img-search');
    
    let currentUploadData = null;
    let allAssets = []; 
    let searchTerm = '';

    window.handlePageAuth = (user) => {
        if (user) {
            addBtn.style.display = 'block';
            fetchAssets();
        } else {
            document.getElementById('loading-status').innerHTML = "Please login to view your assets.";
        }
    };

    async function fetchAssets() {
        // CHANGED: 'thumbnail_url' -> 'thumb_url'
        const { data, error } = await supabase
            .from('session_images')
            .select(`
                id, name, search_keys, image_id, created_at,
                freehost_images ( image_url, thumb_url ) 
            `)
            .order('created_at', { ascending: false });

        if (error) {
            console.error(error);
            document.getElementById('loading-status').innerText = "Error loading assets.";
            return;
        }

        document.getElementById('loading-status').style.display = 'none';
        
        // Flatten Data Structure
        allAssets = data.map(item => {
            const imgData = item.freehost_images;
            const imgObj = Array.isArray(imgData) ? imgData[0] : imgData;
            
            return { 
                ...item, 
                fullUrl: imgObj?.image_url || '',
                // UPDATED HERE AS WELL TO MATCH
                thumbUrl: imgObj?.thumb_url || imgObj?.image_url || 'https://placehold.co/200?text=No+Img'
            };
        });

        renderAssets();
    }

    // --- Search & Render ---
    searchInput.addEventListener('input', (e) => {
        searchTerm = e.target.value.toLowerCase();
        renderAssets();
    });

    function renderAssets() {
        container.innerHTML = ''; 
        
        const filtered = allAssets.filter(a => {
            const inName = a.name.toLowerCase().includes(searchTerm);
            const inTags = (a.search_keys || '').toLowerCase().includes(searchTerm);
            return inName || inTags;
        });

        if (filtered.length === 0) {
            container.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color:#666; margin-top:40px;">No assets found.</div>`;
            return;
        }

        container.innerHTML = filtered.map(item => `
            <div class="asset-card">
                <div class="asset-thumb-container" onclick="openLightbox('${item.fullUrl}')">
                    <img src="${item.thumbUrl}" class="asset-thumb" loading="lazy">
                </div>
                <div class="asset-info">
                    <div>
                        <div class="asset-name" title="${item.name}">${item.name}</div>
                        <div class="asset-tags" title="${item.search_keys || ''}">${item.search_keys || ''}</div>
                    </div>
                    <div class="btn-row">
                        <button class="icon-btn" onclick="copyLink('${item.fullUrl}', this)" title="Copy Link">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                        <button class="icon-btn delete-btn" onclick="deleteAsset('${item.id}', '${item.image_id}')" title="Delete">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // --- Actions ---
    
    // 1. Upload & Add Flow
    window.addEventListener('image-upload-complete', (e) => {
        currentUploadData = e.detail;
        document.getElementById('preview-img').src = currentUploadData.url; 
        document.getElementById('inp-name').value = ""; 
        document.getElementById('inp-tags').value = ""; 
        document.getElementById('save-status').innerText = ""; 
        document.getElementById('add-overlay').style.display = 'flex';
    });

    document.getElementById('save-db-btn').addEventListener('click', async () => {
        const name = document.getElementById('inp-name').value;
        const tags = document.getElementById('inp-tags').value;
        const status = document.getElementById('save-status');
        
        if (!name) { alert("Please enter a name."); return; }
        status.innerText = "Saving...";
        
        try {
            const { data: { user } } = await supabase.auth.getUser();

            const { error } = await supabase.from('session_images').insert([{
                image_id: currentUploadData.id,
                user_id: user.id,
                name: name,
                search_keys: tags
            }]);

            if (error) throw error;

            closeAddModal();
            fetchAssets(); 

        } catch (err) {
            status.style.color = '#ff6b6b';
            status.innerText = "Error: " + err.message;
        }
    });

    window.closeAddModal = () => {
        document.getElementById('add-overlay').style.display = 'none';
    };

    // 2. Delete
    window.deleteAsset = async (rowId, imageId) => {
        if (!confirm("Delete this asset permanently?")) return;
        try {
            // Delete metadata row
            await supabase.from('session_images').delete().eq('id', rowId);
            // Optionally delete the underlying image if you don't want orphans
            if (imageId) await supabase.from('freehost_images').delete().eq('id', imageId);
            fetchAssets(); 
        } catch (err) { alert(err.message); }
    };

    // 3. Copy Link
    window.copyLink = (url, btn) => {
        navigator.clipboard.writeText(url);
        const originalHtml = btn.innerHTML;
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4cd964" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        setTimeout(() => btn.innerHTML = originalHtml, 1500);
    };

    // 4. Lightbox
    window.openLightbox = (url) => {
        document.getElementById('lightbox-img').src = url;
        document.getElementById('lightbox-overlay').style.display = 'flex';
    };
    window.closeLightbox = () => {
        document.getElementById('lightbox-overlay').style.display = 'none';
    };
    
    // Close on Escape
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeAddModal();
            closeLightbox();
        }
    });

</script>

<script src="/codex/assets/js/freeimage-upload.js"></script>
